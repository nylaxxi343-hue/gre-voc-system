<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xy'Assoc.♥︎ - Mobile Reader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
  </style>
</head>
<body class="bg-white min-h-screen">
  <div class="min-h-screen bg-white">
    <header class="bg-purple-50 border-b border-purple-100 px-4 py-4">
      <div class="max-w-md mx-auto flex items-center gap-3">
        <div class="text-purple-500 text-xl">♥</div>
        <div>
          <h1 class="text-xl font-bold text-gray-800">xy'Assoc.♥︎</h1>
          <p class="text-xs text-gray-500">mobile readonly</p>
        </div>
      </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-5">
      <section class="bg-gray-50 rounded-2xl p-4 mb-5">
        <div class="text-sm text-gray-500 mb-2">📚 词库状态</div>
        <div id="statusText" class="text-gray-800 font-medium">准备读取词库...</div>
      </section>

      <section class="mb-5">
        <div class="relative">
          <input
            id="searchInput"
            type="text"
            placeholder="搜索单词、释义、同义词或分组名..."
            class="w-full px-4 py-3 rounded-xl border border-purple-200 bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500"
          />
        </div>
      </section>

      <section class="grid grid-cols-3 gap-3 mb-5">
        <div class="bg-purple-50 rounded-2xl p-4 text-center">
          <div class="text-xs text-gray-500 mb-1">总收录</div>
          <div id="totalCount" class="text-xl font-bold text-gray-900">0</div>
        </div>
        <div class="bg-purple-50 rounded-2xl p-4 text-center">
          <div class="text-xs text-gray-500 mb-1">今日新增</div>
          <div id="todayCount" class="text-xl font-bold text-purple-600">0</div>
        </div>
        <div class="bg-purple-50 rounded-2xl p-4 text-center">
          <div class="text-xs text-gray-500 mb-1">本周学习</div>
          <div id="weekCount" class="text-xl font-bold text-purple-600">0</div>
        </div>
      </section>

      <section class="mb-5">
        <div class="flex gap-2">
          <button id="tabList" class="flex-1 py-3 rounded-xl bg-purple-500 text-white font-medium">单词列表</button>
          <button id="tabReview" class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-medium">复习模式</button>
        </div>
      </section>

      <section id="listView">
        <div id="wordListContainer" class="space-y-4"></div>
      </section>

      <section id="reviewView" class="hidden">
        <div class="flex items-center justify-between mb-4">
          <div id="reviewIndexText" class="text-sm text-gray-600">0 / 0</div>
          <button id="shuffleBtn" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700">随机</button>
        </div>

        <div id="reviewCard" class="rounded-2xl bg-gradient-to-br from-purple-100 to-indigo-100 min-h-[260px] p-6 flex flex-col items-center justify-center text-center cursor-pointer">
          <div id="reviewFront" class="block">
            <div id="reviewWord" class="text-3xl font-bold text-gray-900 mb-3">暂无单词</div>
            <div class="text-purple-600">点击查看答案</div>
          </div>
          <div id="reviewBack" class="hidden">
            <div id="reviewMean" class="text-xl text-purple-800 mb-3"></div>
            <div id="reviewSyn" class="text-base text-purple-600"></div>
          </div>
        </div>

        <div class="flex justify-between mt-4">
          <button id="prevBtn" class="px-5 py-3 rounded-xl bg-gray-100 text-gray-800 font-medium">上一个</button>
          <button id="nextBtn" class="px-5 py-3 rounded-xl bg-gray-100 text-gray-800 font-medium">下一个</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const GITHUB_WORDS_URL = "https://raw.githubusercontent.com/nylaxxi343-hue/gre-voc-system/main/words.json";

    let allWords = [];
    let filteredWords = [];
    let reviewWords = [];
    let reviewIndex = 0;
    let showAnswer = false;
    let collapsedGroups = {};

    const statusText = document.getElementById("statusText");
    const totalCount = document.getElementById("totalCount");
    const todayCount = document.getElementById("todayCount");
    const weekCount = document.getElementById("weekCount");
    const searchInput = document.getElementById("searchInput");
    const wordListContainer = document.getElementById("wordListContainer");

    const tabList = document.getElementById("tabList");
    const tabReview = document.getElementById("tabReview");
    const listView = document.getElementById("listView");
    const reviewView = document.getElementById("reviewView");

    const reviewIndexText = document.getElementById("reviewIndexText");
    const reviewCard = document.getElementById("reviewCard");
    const reviewFront = document.getElementById("reviewFront");
    const reviewBack = document.getElementById("reviewBack");
    const reviewWord = document.getElementById("reviewWord");
    const reviewMean = document.getElementById("reviewMean");
    const reviewSyn = document.getElementById("reviewSyn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");

    function formatToday() {
      return new Date().toLocaleDateString("en-CA");
    }

    function formatWeekAgo() {
      const d = new Date();
      d.setDate(d.getDate() - 7);
      return d.toLocaleDateString("en-CA");
    }

    function normalizeWords(data) {
      return (Array.isArray(data) ? data : []).map(item => ({
        id: String(item.id || ""),
        word: item.word || "",
        mean: item.mean || "",
        syn: item.syn || "",
        date: item.date || "",
        group: item.group || item.date || "未分组"
      }));
    }

    function updateStats(words) {
      totalCount.textContent = words.length;
      const today = formatToday();
      const weekAgo = formatWeekAgo();

      todayCount.textContent = words.filter(w => w.date === today).length;
      weekCount.textContent = words.filter(w => w.date >= weekAgo).length;
    }

    function groupWords(words) {
      const groups = {};
      words.forEach(item => {
        const groupKey = item.group || item.date || "未分组";
        if (!groups[groupKey]) groups[groupKey] = [];
        groups[groupKey].push(item);
      });

      return Object.entries(groups).sort((a, b) => {
        const aLatest = a[1].map(item => item.date || "").sort().slice(-1)[0] || "";
        const bLatest = b[1].map(item => item.date || "").sort().slice(-1)[0] || "";
        return bLatest.localeCompare(aLatest);
      });
    }

    function renderWordList(words) {
      wordListContainer.innerHTML = "";

      if (!words.length) {
        wordListContainer.innerHTML = '<div class="text-center text-gray-500 py-12">暂无匹配单词</div>';
        return;
      }

      const groups = groupWords(words);

      groups.forEach(([groupName, items]) => {
        const latestDate = items.map(item => item.date || "").sort().slice(-1)[0] || "";
        const isCollapsed = !!collapsedGroups[groupName];

        const wrapper = document.createElement("div");
        wrapper.className = "rounded-2xl border border-purple-200 bg-purple-50 overflow-hidden";

        const header = document.createElement("button");
        header.className = "w-full px-4 py-4 text-left";
        header.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="text-lg text-purple-600">${isCollapsed ? "▶" : "▼"}</div>
            <div class="flex-1">
              <div class="font-semibold text-gray-900">${groupName}</div>
              <div class="text-xs text-gray-500">${items.length} 个单词 · 最新日期 ${latestDate}</div>
            </div>
          </div>
        `;
        header.addEventListener("click", () => {
          collapsedGroups[groupName] = !collapsedGroups[groupName];
          renderWordList(filteredWords);
        });

        wrapper.appendChild(header);

        if (!isCollapsed) {
          const body = document.createElement("div");
          body.className = "px-4 pb-4 space-y-3 border-t border-purple-200";

          items.forEach(entry => {
            const card = document.createElement("div");
            card.className = "bg-white rounded-xl p-4";
            card.innerHTML = `
              <div class="font-semibold text-lg text-gray-900 mb-1">${entry.word}</div>
              <div class="text-sm text-gray-700 mb-2">${entry.mean}</div>
              <div class="text-sm text-gray-600 mb-1"><span class="font-medium">Synonyms:</span> ${entry.syn}</div>
              <div class="text-xs text-gray-500">日期：${entry.date}</div>
            `;
            body.appendChild(card);
          });

          wrapper.appendChild(body);
        }

        wordListContainer.appendChild(wrapper);
      });
    }

    function renderReviewCard() {
      if (!reviewWords.length) {
        reviewIndexText.textContent = "0 / 0";
        reviewWord.textContent = "暂无单词";
        reviewMean.textContent = "";
        reviewSyn.textContent = "";
        reviewFront.classList.remove("hidden");
        reviewBack.classList.add("hidden");
        return;
      }

      const item = reviewWords[reviewIndex];
      reviewIndexText.textContent = `${reviewIndex + 1} / ${reviewWords.length}`;
      reviewWord.textContent = item.word;
      reviewMean.textContent = item.mean;
      reviewSyn.textContent = item.syn;

      if (showAnswer) {
        reviewFront.classList.add("hidden");
        reviewBack.classList.remove("hidden");
      } else {
        reviewFront.classList.remove("hidden");
        reviewBack.classList.add("hidden");
      }
    }

    function switchToList() {
      listView.classList.remove("hidden");
      reviewView.classList.add("hidden");
      tabList.className = "flex-1 py-3 rounded-xl bg-purple-500 text-white font-medium";
      tabReview.className = "flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-medium";
    }

    function switchToReview() {
      listView.classList.add("hidden");
      reviewView.classList.remove("hidden");
      tabList.className = "flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-medium";
      tabReview.className = "flex-1 py-3 rounded-xl bg-purple-500 text-white font-medium";
      reviewWords = filteredWords.length ? filteredWords : allWords;
      reviewIndex = 0;
      showAnswer = false;
      renderReviewCard();
    }

    function applySearch() {
      const q = searchInput.value.trim().toLowerCase();

      filteredWords = !q
        ? allWords
        : allWords.filter(item =>
            item.word.toLowerCase().includes(q) ||
            item.mean.toLowerCase().includes(q) ||
            item.syn.toLowerCase().includes(q) ||
            (item.group || "").toLowerCase().includes(q)
          );

      renderWordList(filteredWords);
      reviewWords = filteredWords.length ? filteredWords : allWords;
      if (reviewIndex >= reviewWords.length) reviewIndex = 0;
      renderReviewCard();
    }

    searchInput.addEventListener("input", applySearch);
    tabList.addEventListener("click", switchToList);
    tabReview.addEventListener("click", switchToReview);

    reviewCard.addEventListener("click", () => {
      if (!reviewWords.length) return;
      showAnswer = !showAnswer;
      renderReviewCard();
    });

    prevBtn.addEventListener("click", () => {
      if (!reviewWords.length) return;
      reviewIndex = (reviewIndex - 1 + reviewWords.length) % reviewWords.length;
      showAnswer = false;
      renderReviewCard();
    });

    nextBtn.addEventListener("click", () => {
      if (!reviewWords.length) return;
      reviewIndex = (reviewIndex + 1) % reviewWords.length;
      showAnswer = false;
      renderReviewCard();
    });

    shuffleBtn.addEventListener("click", () => {
      if (!reviewWords.length) return;
      reviewIndex = Math.floor(Math.random() * reviewWords.length);
      showAnswer = false;
      renderReviewCard();
    });

    async function loadWords() {
      try {
        statusText.textContent = "正在读取 GitHub 词库...";
        const res = await fetch(GITHUB_WORDS_URL, { cache: "no-store" });
        const data = await res.json();

        allWords = normalizeWords(data);
        filteredWords = allWords;
        reviewWords = allWords;

        renderWordList(filteredWords);
        renderReviewCard();
        updateStats(allWords);

        statusText.textContent = `词库加载完成，共 ${allWords.length} 条`;
      } catch (error) {
        console.error(error);
        statusText.textContent = "读取失败，请检查 GitHub 词库地址";
      }
    }

    loadWords();
  </script>
</body>
</html>
